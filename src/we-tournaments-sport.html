{{#> layout pageTitle="WE Tournaments" subPage=true activePage="predict" backUrl="/we-rewards.html?tab=tournaments"}}

<div class="p-4">

  <!-- ══ HERO BANNER ══ -->
  <figure class="relative w-full h-44 overflow-hidden rounded-t-xl"
    style="background:linear-gradient(135deg,#1a0000,#7c0000,#b45309,#92400e)">
    <img src="/assets/images/we-rewards/tournaments-2.png" class="w-full h-full object-cover" />
    <div class="absolute top-3 left-3 flex items-center gap-2">
      <div class="badge bg-primary border-none text-black font-extrabold text-[11px] px-2.5 py-3 rounded-full">Started
      </div>
      <div class="badge bg-black/50 border-none text-white font-semibold text-[11px] gap-1 px-2.5 py-3 rounded-full">
        <svg class="w-3 h-3 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        Time Remaining: 23:24:12
      </div>
    </div>
  </figure>

  <!-- ══ TABS (DaisyUI) ══ -->
  <div role="tablist" class="tabs tabs-we">
    <button role="tab" data-ttab="leaderboard" class="tab tab-active">Leaderboard</button>
    <button role="tab" data-ttab="games" class="tab">Tournamens Games</button>
    <button role="tab" data-ttab="rules" class="tab">Rules &amp; FAQs</button>
  </div>

  {{> we-tournaments/tabs/leaderboard}}
  {{> we-tournaments/tabs/games-sport}}
  {{> we-tournaments/tabs/rules-faqs-sport}}

</div>

<!-- MODALS -->
{{> modals/we-tournaments}}

{{/layout}}
