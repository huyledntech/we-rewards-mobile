<!-- ── mystery-free-section.html ── -->
<section class="py-4 bg-[#E3E4E5]">
  <div class="flex items-center gap-2 px-3 pb-2">
    <h2 class="font-heading font-bold text-base text-gray-900 flex items-center gap-2">
      <img src="/assets/icons/mystery-free-gift.png" class="w-7 -mt-3" />
      <!-- <span data-i18n="we_rewards.mystery_free_gift"></span> -->
      <span>Mystery Drops</span>
    </h2>
  </div>


  <div id="scroll-free" class="flex gap-2.5 overflow-x-auto px-3 pb-2 scrollbar-hide scroll-smooth">

    <!-- card: 8.8 Free Bonus -->
    <div class="shrink-0 w-56 bg-secondary rounded-xl overflow-hidden border border-gray-100 shadow-sm">
      <div
        class="relative h-24 bg-gradient-to-br from-green-900 via-green-700 to-green-900 flex items-center justify-center">
        <img src="/assets/images/we-rewards/free-gift/1.png" class="w-full h-full object-cover" />
      </div>
      <div class="p-2.5">
        <p class="font-heading font-bold text-xs text-gray-100 mb-1.5 flex items-center justify-between">
          8.8 Anniversary Free Bonus
          <button class="" onclick="document.getElementById('8-8-anniversary-free-bonus-info-free-modal').showModal()">
            <i class="fa-solid fa-circle-info"></i>
          </button>
        </p>
        <span
          class="inline-flex items-center gap-1 bg-primary text-black text-1xs font-bold px-2 py-0.5 rounded-lg mb-2">
          <span data-i18n="we_rewards.ends_in"></span>
          <span class="countdown-timer" data-expire="1">
            <span class="countdown">
              <span class="hours" style="--value:0"></span>:
            </span>
            <span class="countdown">
              <span class="minutes" style="--value:0"></span>:
            </span>
            <span class="countdown">
              <span class="seconds" style="--value:0"></span>
            </span>
          </span>
        </span>
        <div class="flex gap-2 mb-2.5">
          <div class="flex-1 text-1xs font-semibold">
            <p class="text-gray-100 mb-1" data-i18n="we_rewards.rewards_label"></p>
            <p class="text-gray-100 leading-3">MYR8 Free Bonus from WE88</p>
          </div>
        </div>
        <p class="text-[#FFFFFFBF] italic text-2xs mb-1">Exclusive rewards just for you!</p>
        <button class="w-full bg-primary text-black py-1 font-bold rounded-lg glow-hover"
          data-i18n="we_rewards.claim_now"
          onclick="document.getElementById('8-8-anniversary-free-bonus-free-modal').showModal()"></button>
      </div>
    </div>

  </div>
</section>

{{> we-rewards/items/free}}
