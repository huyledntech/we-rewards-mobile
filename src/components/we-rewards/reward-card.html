<div class="card bg-base-100 shadow-sm border border-base-200">
  <figure class="px-4 pt-4">
    <img src="{{image}}" alt="{{title}}" class="rounded-xl aspect-video object-cover w-full" />
  </figure>
  <div class="card-body">
    <div class="flex justify-between items-start">
      <h3 class="card-title text-base font-bold">{{title}}</h3>
      <div class="badge badge-secondary badge-outline">{{points}} pts</div>
    </div>
    <p class="text-sm text-gray-500 line-clamp-2">{{description}}</p>
    <div class="card-actions mt-2">
      <button class="btn btn-primary btn-sm btn-block">Redeem Now</button>
    </div>
  </div>
</div>
