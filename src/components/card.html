<div class="card bg-base-100 shadow-md hover:shadow-xl transition-all duration-300 feature-card">
  <div class="card-body">
    <div class="text-4xl mb-3">
      <i class="{{iconClass}} text-primary"></i>
    </div>
    <h3 class="card-title text-lg font-semibold" data-i18n="{{titleKey}}">Feature</h3>
    <p class="text-gray-500 text-sm leading-relaxed" data-i18n="{{descKey}}">Feature description.</p>
    <div class="card-actions justify-end mt-4">
      <button class="btn btn-sm btn-primary">
        <i class="fa-solid fa-circle-info mr-1"></i>
        <span data-i18n="card.learn_more"></span>
      </button>
    </div>
  </div>
</div>
