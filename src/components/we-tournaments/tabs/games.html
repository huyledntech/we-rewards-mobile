<!-- ══════════════════ PANEL: Tournament Games ══════════════════ -->
<div id="tpanel-games" class="hidden fade-in pb-24">

  <!-- records row -->
  {{> we-tournaments/records-row}}

  <!-- search input (DaisyUI input) -->
  <div class="mb-3">
    <label class="w-2/3 ml-auto input input-sm input-bordered flex items-center gap-2 rounded-full bg-gray-50 border-gray-200 focus-within:border-yellow-400 focus-within:outline-none text-[13px]">
      <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
      <input type="text" class="grow bg-transparent outline-none text-[13px] text-gray-600 placeholder:text-gray-400"
        placeholder="Search your favorites games" />
    </label>
  </div>

  <!-- game grid (Tailwind grid) -->
  <div class="grid grid-cols-3 gap-2 mb-4 relative">
